<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HR AI Assessment</title>

<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&family=Noto+Serif+Thai:wght@400;600;700&display=swap" rel="stylesheet">

<style>
/* ===== THEME ===== */
:root{
  --bg:#0b1622;--surface:#13263d;--surface2:#1c334d;
  --border:rgba(255,255,255,0.08);
  --gold:#c9a84c;--goldL:#e6c96a;--goldPale:rgba(201,168,76,0.12);
  --white:#eef4ff;--muted:#7a8fa8;
}
*{box-sizing:border-box}
body{
  margin:0;font-family:'Sarabun',sans-serif;
  background:var(--bg);color:var(--white)
}

/* ===== TOP BAR ===== */
.topbar{background:#0b1622;border-bottom:1px solid rgba(201,168,76,.3)}
.topbar-inner{max-width:960px;margin:auto;padding:12px 20px;display:flex;justify-content:space-between}
.brand-name{font-family:'Noto Serif Thai',serif;font-weight:700;color:var(--goldL)}
.tab-nav{display:flex;gap:6px;padding:0 20px}
.tab-btn{
  background:none;border:none;color:var(--muted);
  padding:10px 16px;font-weight:600;cursor:pointer
}
.tab-btn.active{color:var(--goldL);border-bottom:2px solid var(--gold)}
.tab-btn.locked{opacity:.4;pointer-events:none}

/* ===== PANES ===== */
.tab-pane{display:none}
.tab-pane.active{display:block}
.container{max-width:960px;margin:auto;padding:20px}

/* ===== BUTTON ===== */
.btn{
  background:linear-gradient(135deg,#c9a84c,#e6c96a);
  border:none;padding:12px 30px;border-radius:10px;
  font-weight:700;cursor:pointer
}
.btn:disabled{opacity:.5}

/* ===== TABLE ===== */
table{width:100%;border-collapse:collapse}
th,td{padding:10px;border-bottom:1px solid rgba(255,255,255,.08)}
th{color:var(--goldL);text-align:left;font-size:12px}
</style>
</head>

<body>

<!-- ===== TOP ===== -->
<div class="topbar">
  <div class="topbar-inner">
    <div class="brand-name">🤖 HR AI Assessment</div>
  </div>
  <div class="tab-nav">
    <button class="tab-btn active" id="btn-exam" onclick="switchTab('exam')">📝 ทำข้อสอบ</button>
    <button class="tab-btn locked" id="btn-result" onclick="switchTab('result')">📊 ผลลัพธ์</button>
    <button class="tab-btn" id="btn-admin" onclick="openAdminTab()">🛠 Admin</button>
  </div>
</div>

<!-- ===== EXAM ===== -->
<div class="tab-pane active" id="pane-exam">
  <div class="container">
    <h2>📝 แบบทดสอบ HR + AI</h2>

    <textarea id="a1" placeholder="คำตอบข้อ 1" style="width:100%;min-height:80px"></textarea><br><br>
    <textarea id="a2" placeholder="คำตอบข้อ 2" style="width:100%;min-height:80px"></textarea><br><br>
    <textarea id="a3" placeholder="คำตอบข้อ 3" style="width:100%;min-height:80px"></textarea><br><br>
    <textarea id="a4" placeholder="คำตอบข้อ 4" style="width:100%;min-height:80px"></textarea><br><br>
    <textarea id="a5" placeholder="คำตอบข้อ 5" style="width:100%;min-height:80px"></textarea><br><br>

    <button class="btn" id="submitBtn" onclick="doSubmit(false)">ส่งให้ AI ตรวจ</button>
  </div>
</div>

<!-- ===== RESULT ===== -->
<div class="tab-pane" id="pane-result">
  <div class="container">
    <h2>📊 ผลการประเมิน</h2>
    <pre id="resultBox" style="white-space:pre-wrap;color:#eef4ff"></pre>
  </div>
</div>

<!-- ===== ADMIN ===== -->
<div class="tab-pane" id="pane-admin">
  <div class="container">
    <h2>🛠 Admin Dashboard</h2>
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>ชื่อ</th>
          <th>แผนก</th>
          <th>บริษัท</th>
          <th>คะแนน</th>
          <th>ระดับ</th>
        </tr>
      </thead>
      <tbody id="admin-tbody">
        <tr><td colspan="6">ยังไม่มีข้อมูล</td></tr>
      </tbody>
    </table>
  </div>
</div>

<script>
/* ===== CONFIG ===== */
const WORKER_URL = 'https://aged-disk-25db.kamolklang-nick.workers.dev';
const STORAGE_KEY = 'hr_exam_records';
const ADMIN_PIN = '134300';

/* ===== STATE ===== */
let answers = {1:'',2:'',3:'',4:'',5:''};
let submitTriggered = false;

/* ===== TAB ===== */
function switchTab(t){
  ['exam','result','admin'].forEach(x=>{
    document.getElementById('pane-'+x).classList.toggle('active',x===t);
    document.getElementById('btn-'+x)?.classList.toggle('active',x===t);
  });
}

/* ===== SUBMIT ===== */
async function doSubmit(){
  if(submitTriggered) return;
  submitTriggered=true;

  for(let i=1;i<=5;i++){
    answers[i]=document.getElementById('a'+i).value||'-';
  }

  const prompt =
`ตรวจข้อสอบ HR AI
คำตอบ:
1 ${answers[1]}
2 ${answers[2]}
3 ${answers[3]}
4 ${answers[4]}
5 ${answers[5]}
ตอบเป็น JSON`;

  const r = await fetch(WORKER_URL,{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({prompt})
  });
  const data = await r.json();

  let result;
  if(data.type==='JSON') result=data.text;
  else{
    const t=data.text;
    result=JSON.parse(t.slice(t.indexOf('{'),t.lastIndexOf('}')+1));
  }

  document.getElementById('resultBox').textContent =
    'คะแนนรวม: '+result.totalScore+'\nระดับ: '+result.level;

  const rec={
    fname:'-',lname:'-',dept:'-',company:'-',
    totalScore:result.totalScore,
    level:result.level
  };

  const all=JSON.parse(localStorage.getItem(STORAGE_KEY)||'[]');
  all.unshift(rec);
  localStorage.setItem(STORAGE_KEY,JSON.stringify(all));

  document.getElementById('btn-result').classList.remove('locked');
  switchTab('result');
}

/* ===== ADMIN ===== */
function openAdminTab(){
  const pin=prompt('ใส่รหัส Admin');
  if(pin!==ADMIN_PIN){alert('รหัสไม่ถูกต้อง');return;}
  renderAdmin();
  switchTab('admin');
}
function renderAdmin(){
  const tb=document.getElementById('admin-tbody');
  const recs=JSON.parse(localStorage.getItem(STORAGE_KEY)||'[]');
  if(recs.length===0){
    tb.innerHTML='<tr><td colspan="6">ยังไม่มีข้อมูล</td></tr>';
    return;
  }
  tb.innerHTML=recs.map((r,i)=>`
    <tr>
      <td>${i+1}</td>
      <td>${r.fname} ${r.lname}</td>
      <td>${r.dept}</td>
      <td>${r.company}</td>
      <td><b>${r.totalScore}</b></td>
      <td>${r.level}</td>
    </tr>
  `).join('');
}
</script>

</body>
</html>
